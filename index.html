let currentStep = 0;
let selections = { meat: null, spicy: null, soup: null };

function initQuiz() {
  currentStep = 0;
  selections = { meat: null, spicy: null, soup: null };
  renderStep();
}

function renderStep() {
  const step = steps[currentStep];
  const isLast = currentStep === steps.length - 1;

  document.getElementById('stepIndicator').innerHTML = steps.map((s, i) => {
    let cls = '';
    if (i < currentStep) cls = 'done';
    else if (i === currentStep) cls = 'active';
    return `<span class="step-dot ${cls}"></span>`;
  }).join('');

  document.getElementById('stepEmoji').textContent = step.emoji;
  document.getElementById('stepQuestion').textContent = step.question;

  document.getElementById('stepOptions').innerHTML = step.options.map(opt => {
    const sel = selections[step.id] === opt.value ? ' selected' : '';
    const skip = opt.skip ? ' skip' : '';
    return `<button class="step-option${sel}${skip}" onclick="selectOption('${step.id}', '${opt.value}', ${opt.skip})">${opt.label}</button>`;
  }).join('');

  updateFilterSummary();

  document.getElementById('stepNav').innerHTML = `
    ${currentStep > 0 ? '<button class="btn-step btn-prev" onclick="prevStep()">← 上一步</button>' : ''}
    <button class="btn-step btn-next" onclick="nextStep()">${isLast ? '🎀 去转盘！' : '下一步 →'}</button>
  `;
}

function selectOption(stepId, value, isSkip) {
  selections[stepId] = isSkip ? null : value;
  renderStep();
}

function updateFilterSummary() {
  const chips = [];
  for (const step of steps) {
    if (selections[step.id]) {
      const opt = step.options.find(o => o.value === selections[step.id]);
      if (opt) chips.push(opt.label);
    }
  }
  document.getElementById('filterSummary').innerHTML = chips.map(c =>
    `<span class="filter-chip">${c}</span>`
  ).join('');

  const filtered = filterDishes();
  const countEl = document.getElementById('matchCount');
  if (chips.length > 0) {
    countEl.textContent = `匹配 ${filtered.length} 道菜`;
    countEl.className = 'match-count' + (filtered.length < 2 ? ' warn' : '');
  } else {
    countEl.textContent = '';
    countEl.className = 'match-count';
  }
}

function prevStep() {
  if (currentStep > 0) { currentStep--; renderStep(); }
}

function nextStep() {
  if (currentStep < steps.length - 1) {
    currentStep++;
    renderStep();
  } else {
    filteredMenu = filterDishes();
    if (filteredMenu.length === 0) {
      alert('没有匹配的菜 😢 请放宽条件试试～');
      return;
    }
    showWheel();
  }
}

function filterDishes() {
  return dishes.filter(d => {
    if (selections.meat && d.meat !== selections.meat) return false;
    if (selections.spicy && d.spicy !== selections.spicy) return false;
    if (selections.soup && d.soup !== selections.soup) return false;
    return true;
  }).map(d => d.name);
}

const cy = size / 2;
const radius = size / 2 - 6;
let currentRotation = 0;

// Pastel segment colors
const segmentColors = [
  '#f0a0b8', '#e8c8a0', '#d8d0e8', '#a8d0c8',
  '#f0c8a8', '#d0b8d8', '#b8d8c8', '#f0a8a0',
  '#c8d0e8', '#e8d0b0', '#d8b8c8', '#a8c8d8',
  '#e8b8c0', '#c8e0d0', '#e0c8d8', '#d8c8b8',
  '#f0b8c8', '#c8d8e0', '#e8c8d0', '#d0e0c8'
];

function drawWheel(rotation) {
  const n = menu.length;
  if (n === 0) return;
  const angle = (2 * Math.PI) / n;
  ctx.clearRect(0, 0, size, size);

  for (let i = 0; i < n; i++) {
    const startAngle = rotation + i * angle - Math.PI / 2;
    const endAngle = startAngle + angle;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, radius, startAngle, endAngle);
    ctx.closePath();
    ctx.fillStyle = segmentColors[i % segmentColors.length];
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(startAngle + angle / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#5a4048';
    ctx.font = 'bold 13px "PingFang SC","Noto Sans CJK SC","Microsoft YaHei",sans-serif';
    const text = menu[i];
    const maxWidth = radius - 36;
    let displayText = text;
    if (ctx.measureText(text).width > maxWidth) {
      while (ctx.measureText(displayText + '…').width > maxWidth && displayText.length > 2) {
        displayText = displayText.slice(0, -1);
      }
      displayText += '…';
    }
    ctx.fillText(displayText, radius - 18, 5);
    ctx.restore();
  }

  // Center circle
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  ctx.fillStyle = '#fef5f0';
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,150,170,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, 2 * Math.PI);
  ctx.fillStyle = '#d4788a';
  ctx.fill();
}

function showWheel() {
  menu = [...filteredMenu];
  currentRotation = 0;
  historyList = [];
  document.getElementById('result').innerHTML = '';
  document.getElementById('history').innerHTML = '';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('wheelSection').classList.add('show');
  drawWheel(currentRotation);
}

function goBackToQuiz() {
  document.getElementById('wheelSection').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  document.getElementById('result').innerHTML = '';
  document.getElementById('history').innerHTML = '';
  initQuiz();
}

function spin() {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('btnSpin');
  btn.disabled = true;
  btn.textContent = '🎀 转动中...';
  document.getElementById('result').innerHTML = '';

  const n = menu.length;
  const targetIndex = Math.floor(Math.random() * n);
  const segmentAngle = (2 * Math.PI) / n;
  const targetAngle = targetIndex * segmentAngle + segmentAngle / 2;
  const fullRotations = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const endRotation = currentRotation + fullRotations + (2 * Math.PI - (currentRotation % (2 * Math.PI)) - targetAngle);

  const duration = 4000 + Math.random() * 2000;
  const startRotation = currentRotation;
  const startTime = performance.now();

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    currentRotation = startRotation + (endRotation - startRotation) * eased;
    drawWheel(currentRotation);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentRotation = endRotation;
      spinning = false;
      btn.disabled = false;
      btn.textContent = '🎀 转一转';
      const result = menu[targetIndex];
      showResult(result);
      addHistory(result);
      launchConfetti();
    }
  }
  requestAnimationFrame(animate);
}

function showResult(result) {
  document.getElementById('result').innerHTML = `
    <span class="result-emoji">${result.slice(0, 2)}</span>
    <span class="result-text">今天吃：${result}</span>
  `;
}

function addHistory(item) {
  historyList.unshift(item);
  if (historyList.length > 10) historyList.pop();
  renderHistory();
}

function renderHistory() {
  document.getElementById('history').innerHTML = historyList.map((h, i) =>
    `<span class="tag" style="animation-delay:${i * 0.05}s">${h}</span>`
  ).join('');
}

// ========== CONFETTI ==========
const confettiCanvas = document.getElementById('confetti');
const ctxf = confettiCanvas.getContext('2d');
let confettiParticles = [];

function resizeConfetti() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeConfetti);
resizeConfetti();

function launchConfetti() {
  const colors = ['#f0a0b8', '#e8c8a0', '#d8d0e8', '#a8d0c8', '#f0c8a8', '#d0b8d8', '#b8d8c8', '#e8d0b0'];
  confettiParticles = [];
  for (let i = 0; i < 120; i++) {
    confettiParticles.push({
      x: window.innerWidth / 2 + (Math.random() - 0.5) * 60,
      y: window.innerHeight / 2 - 40,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 18 - 8,
      size: Math.random() * 8 + 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 20,
      opacity: 1,
      shape: 'circle'
    });
  }
  animateConfetti();
}

let confettiFrame;
function animateConfetti() {
  if (confettiFrame) cancelAnimationFrame(confettiFrame);
  ctxf.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);

  let alive = false;
  for (const p of confettiParticles) {
    p.x += p.vx;
    p.vy += 0.35;
    p.y += p.vy;
    p.rotation += p.rotSpeed;
    p.opacity -= 0.008;
    if (p.opacity <= 0) continue;
    alive = true;

    ctxf.save();
    ctxf.globalAlpha = Math.max(0, p.opacity);
    ctxf.translate(p.x, p.y);
    ctxf.rotate((p.rotation * Math.PI) / 180);
    ctxf.fillStyle = p.color;
    ctxf.beginPath();
    ctxf.arc(0, 0, p.size / 2, 0, 2 * Math.PI);
    ctxf.fill();
    ctxf.restore();
  }

  if (alive) {
    confettiFrame = requestAnimationFrame(animateConfetti);
  } else {
    ctxf.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  }
}

// ========== CUSTOMIZE ==========
function toggleCustomize() {
  const panel = document.getElementById('customizePanel');
  const input = document.getElementById('menuInput');
  if (!panel.classList.contains('show')) {
    input.value = dishes.map(d => `${d.name} | ${d.meat} | ${d.spicy} | ${d.soup}`).join('\n');
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
}

function applyMenu() {
  const input = document.getElementById('menuInput').value.trim();
  if (!input) return;
  const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
  if (lines.length < 2) {
    alert('至少需要 2 道菜哦！');
    return;
  }
  dishes = lines.map(line => {
    const parts = line.split('|').map(p => p.trim());
    const name = parts[0] || line;
    return {
      name: name,
      emoji: name.slice(0, 2),
      meat: parts[1] || '其他',
      spicy: parts[2] || '不辣',
      soup: parts[3] || '干'
    };
  });
  document.getElementById('customizePanel').classList.remove('show');
  goBackToQuiz();
  if (navigator.vibrate) navigator.vibrate(50);
}

// ========== KEYBOARD ==========
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (!spinning && menu.length > 0 && document.getElementById('wheelSection').classList.contains('show')) {
      spin();
    }
  }
});

// ========== INIT ==========
initQuiz();
</script>
